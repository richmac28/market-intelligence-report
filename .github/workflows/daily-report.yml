name: Daily Market Intelligence Report

on:
  schedule:
    # 8:15 AM IST = 2:30 AM UTC (accounting for 5:30 hour difference)
    - cron: '30 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  send-market-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Market Intelligence Report
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py
    
    - name: Log execution
      if: always()
      run: echo "Daily Market Intelligence Report execution completed"
